version: 2

sources:
  - name: ecommerce
    project: inferreach-demo
    dataset: ecommerce
    tables:
      - name: raw_orders
        description: Raw orders ingested from Kafka via the Python consumer
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
          - name: total_amount
            tests:
              - not_null